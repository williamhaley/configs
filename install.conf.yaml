- defaults:
    link:
      relink: true

- clean: ['~']

- link:
    ~/.config/alacritty: alacritty
    ~/.gitconfig: git/gitconfig
    ~/.ssh/config: ssh/config
    ~/.tmux.conf: tmux/tmux.conf
    ~/.vimrc: vim/vimrc
    ~/.zshenv: zsh/zshenv
    ~/.zshrc: zsh/zshrc
    ~/.config/mimeapps.list:
      if: '[ `uname` = Linux ]'
      path: mimeapps.list
    ~/.Xmodmap:
      if: '[ `uname` = Linux ]'
      path: X/Xmodmap
    ~/.Xresources:
      if: '[ `uname` = Linux ]'
      path: X/Xresources

- create:
    ~/.ssh:
      mode: 0700

- create:
    - ~/bin
    - ~/src
    - ~/Downloads

- shell:
  - [git submodule update --init --recursive, Installing submodules]
